<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>عارض DLoF</title>
  <script src="dlof.browser.js"></script>
</head>
<body>
  <h1>عارض page.dlofpkg</h1>
  <div id="output">جارٍ التحميل...</div>

  <script>
    const output = document.getElementById("output");

    async function loadPackage() {
      try {
        // يجلب ملف page.dlofpkg من نفس مجلد هذه الصفحة تلقائياً
        const response = await fetch("page.dlofpkg");
        if (!response.ok) {
          throw new Error(`تعذّر جلب page.dlofpkg (HTTP ${response.status})`);
        }
        const arrayBuffer = await response.arrayBuffer();
        const bytes = new Uint8Array(arrayBuffer);

        // نفس منطق renderDlofPkgFile لكن من بيانات ثنائية جاهزة بدل File
        const pkg = DLOF.readDlofPkgBrowser(bytes);
        const html = DLOF.renderViewerHtml(pkg);

        const iframe = document.createElement("iframe");
        iframe.style.width = "100%";
        iframe.style.height = "80vh";
        iframe.style.border = "1px solid #ccc";
        output.innerHTML = "";
        output.appendChild(iframe);
        iframe.srcdoc = html;
      } catch (err) {
        output.innerHTML = `<p style="color:red">خطأ: ${err.message}</p>`;
      }
    }

    loadPackage();
  </script>
</body>
</html>
